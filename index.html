<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CALCULADORA DE TAXAS FALCÕES DA BA21</title>

<link rel="icon" type="image/svg+xml" href="icon.svg">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script src="app.js" defer></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.mp{
background:#ffe066;
}

.outras{
background:#111;
color:white;
}

</style>

</head>

<body>

<h1>🦅 CALCULADORA DE TAXAS FALCÕES DA BA21</h1>

<div class="container">

<label>Valor da venda</label> <input id="valor" type="number">

<h3>Mercado Pago</h3>

<label>Pix %</label> <input id="mp_pix" type="number">

<label>Débito %</label> <input id="mp_debito" type="number">

<label>1x %</label> <input id="mp1" type="number">

<div id="mpParcelas"></div>

<h3>Outras adquirências</h3>

<label>Pix %</label> <input id="out_pix" type="number">

<label>Débito %</label> <input id="out_debito" type="number">

<label>1x %</label> <input id="out1" type="number">

<label>MDR 2-6x</label> <input id="mdr1" type="number">

<label>MDR 7-12x</label> <input id="mdr2" type="number">

<label>MDR 13-21x</label> <input id="mdr3" type="number">

<label>Taxa de antecipação mensal (%)</label> <input id="antecipacao" type="number">

<h3>Custos adicionais</h3>

<label>Software Seller</label> <input id="custoSeller" type="number">

<label>Cesta de serviços da conta</label> <input id="custoConta" type="number">

<label>Aluguel da máquina</label> <input id="custoMaquina" type="number">

<button onclick="simular()">SIMULAR</button>

<button onclick="exportar()">EXPORTAR TABELA PNG</button>

</div>

<div id="resultado"></div>

</body>

</html>
