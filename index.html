<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Simulador de Taxas</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script src="app.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

input{
margin:4px;
padding:5px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

#barraContainer{
width:400px;
height:20px;
background:#ddd;
margin-top:10px;
}

#barra{
height:100%;
width:0%;
background:#007bff;
}

</style>

</head>

<body>

<h2>Simulador de Taxas</h2>

<label>Valor da venda</label> <input id="valor" type="number">

<hr>

<h3>Taxas Mercado Pago</h3>

<label>Pix (%)</label> <input id="mp_pix" type="number">

<label>Débito (%)</label> <input id="mp_debito" type="number">

<label>Crédito 1x (%)</label> <input id="mp1" type="number">

<br><br>

<label>Importar taxas por imagem</label> <input type="file" id="uploadOCR" accept="image/*">

<br><br>

<div id="mpParcelas"></div>

<hr>

<h3>Outras adquirências</h3>

<select id="modoConcorrencia">

<option value="manual">Inserir manualmente</option>
<option value="ocr">Importar taxas por imagem</option>

</select>

<br><br>

<div id="concManual">

<label>Pix (%)</label> <input id="out_pix" type="number">

<label>Débito (%)</label> <input id="out_debito" type="number">

<label>Crédito 1x (%)</label> <input id="out1" type="number">

<br><br>

<label>MDR 2x a 6x (%)</label> <input id="mdr1" type="number">

<label>MDR 7x a 12x (%)</label> <input id="mdr2" type="number">

<label>MDR 13x a 21x (%)</label> <input id="mdr3" type="number">

<label>Antecipação (%)</label> <input id="antecipacao" type="number">

</div>

<div id="concOCR" style="display:none">

<label>Buscar imagem da concorrência</label> <input type="file" id="uploadOCRConc" accept="image/*">

</div>

<hr>

<button onclick="simular()">Simular Parcelas</button>

<button onclick="exportar()">Exportar relatório</button>

<div id="resultado"></div>

<hr>

<h3>Simulação de faturamento</h3>

<label>Faturamento mensal</label> <input id="faturamento" type="number">

<br><br>

Pix % <input id="share_pix" type="number">

Débito % <input id="share_debito" type="number">

1x % <input id="share_1x" type="number">

2x % <input id="share_2x" type="number">

4x % <input id="share_4x" type="number">

6x % <input id="share_6x" type="number">

10x % <input id="share_10x" type="number">

<br><br>

<div id="barraContainer">
<div id="barra"></div>
</div>

<span id="contador">0%</span>

<br><br>

<button onclick="simularFaturamento()">

Simular faturamento

</button>

<div id="resultadoFaturamento"></div>

</body>

</html>
