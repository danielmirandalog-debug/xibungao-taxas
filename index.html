<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparador profissional de taxas</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script src="app.js" defer></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#f4f6fa;
margin:0;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#2c7be5;
color:white;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
font-size:11px;
}

td,th{
border:1px solid #ddd;
padding:4px;
text-align:center;
}

th{
background:#f0f2f6;
}

.taxaRuim{
color:red;
font-weight:bold;
}

.radioLinha{
display:flex;
gap:20px;
margin-bottom:15px;
}

</style>

</head>

<body>

<header>
🦅 Comparador profissional de taxas
</header>

<div class="container">

<div class="card">

<label>Valor da venda</label>
<input id="valor" type="number">

</div>

<div class="card">

<h3>Mercado Pago</h3>

<label>Pix (%)</label>
<input id="mp_pix">

<label>Débito (%)</label>
<input id="mp_debito">

<label>Crédito 1x (%)</label>
<input id="mp1">

<h4>Importar taxas por imagem</h4>

<input type="file" id="uploadOCR">
<div id="statusOCR"></div>

<div id="mpParcelas"></div>

</div>

<div class="card">

<h3>Outras adquirências</h3>

<div class="radioLinha">

<label>
<input type="radio" name="modoOutras" value="mdr" checked onchange="trocarModoOutras()">
Preencher com MDR e Antecipação
</label>

<label>
<input type="radio" name="modoOutras" value="manual" onchange="trocarModoOutras()">
Preencher manualmente
</label>

</div>

<div id="modoMDR">

<label>Pix (%)</label>
<input id="out_pix">

<label>Débito (%)</label>
<input id="out_debito">

<label>Crédito 1x (%)</label>
<input id="out1">

<label>MDR 2-6x</label>
<input id="mdr1">

<label>MDR 7-12x</label>
<input id="mdr2">

<label>MDR 13-21x</label>
<input id="mdr3">

<label>Antecipação mensal (%)</label>
<input id="antecipacao">

</div>

<div id="modoManual" style="display:none">

<label>Pix (%)</label>
<input id="out_pix_manual">

<label>Débito (%)</label>
<input id="out_debito_manual">

<label>Crédito 1x (%)</label>
<input id="out1_manual">

<h4>Importar taxas por imagem</h4>

<input type="file" id="uploadOCRConc">
<div id="statusOCRConc"></div>

<div id="outrasParcelas"></div>

</div>

</div>

<div class="card">

<button onclick="simular()">SIMULAR PARCELAS</button>

<div id="resultado"></div>

</div>

<div class="card">

<button onclick="exportar()">EXPORTAR RELATÓRIO</button>

</div>

</div>

</body>
</html>
