<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XIBUNGÃO TAXAS</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{

font-family:Arial;
margin:0;
padding:20px;
background:#f2f2f2;

}

h1{

text-align:center;

}

.container{

background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;

}

input,select,textarea{

width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
cursor:pointer;

}

button:hover{

opacity:0.9;

}

.simular{

background:#2ecc71;
color:white;

}

.compartilhar{

background:#3498db;
color:white;

}

.upload{

background:#f39c12;
color:white;

}

#taxas-mp{

background:#fff3b0;
padding:15px;
border-radius:10px;

}

#taxas-outras{

background:#000;
color:white;
padding:15px;
border-radius:10px;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

td,th{

border:1px solid #ccc;
padding:8px;
text-align:center;

}

th{

background:#eee;

}

</style>

</head>

<body>

<h1>XIBUNGÃO TAXAS</h1>

<div class="container">

<label>Valor da venda</label>
<input id="valor" type="number" placeholder="Digite o valor">

<label>Tipo de simulação</label>

<select id="tipo" onchange="trocarTipo()">

<option value="outras">Outras adquirências</option>
<option value="mp">Mercado Pago</option>

</select>

<div id="taxas-outras">

<h3>Outras adquirências</h3>

<label>Pix (%)</label>
<input id="pix" type="number">

<label>Débito (%)</label>
<input id="debito" type="number">

<label>MDR (%)</label>
<input id="mdr" type="number">

<label>2x a 6x (%)</label>
<input id="taxa1" type="number">

<label>7x a 12x (%)</label>
<input id="taxa2" type="number">

<label>13x a 21x (%)</label>
<input id="taxa3" type="number">

</div>

<div id="taxas-mp" style="display:none">

<h3>Mercado Pago</h3>

<label>Pix (%)</label>
<input id="mp_pix" type="number">

<label>Débito (%)</label>
<input id="mp_debito" type="number">

<label>1x (%)</label>
<input id="mp1" type="number">

<button class="upload" onclick="document.getElementById('imagemTabela').click()">
Carregar imagem da tabela
</button>

<input type="file" id="imagemTabela" accept="image/*" style="display:none">

<p>OCR preencherá automaticamente 2x até 18x</p>

<div id="camposMP"></div>

</div>

<button class="simular" onclick="calcular()">
SIMULAR
</button>

<button class="compartilhar" onclick="compartilhar()">
COMPARTILHAR
</button>

</div>

<div id="resultado"></div>

<script src="app.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>

</html>
