<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XIBUNGÃO TAXAS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>XIBUNGÃO TAXAS</h1>

<div class="container">

<label>Valor da venda</label>
<input id="valor" type="number" placeholder="Digite o valor">

<br><br>

<label>Tipo de simulação</label>

<select id="tipo" onchange="trocarTipo()">

<option value="outras">Outras adquirências</option>
<option value="mp">Mercado Pago</option>

</select>

<br><br>

<div id="taxas-outras">

<h3>Outras adquirências</h3>

<label>Pix (%)</label>
<input id="pix" type="number">

<label>Débito (%)</label>
<input id="debito" type="number">

<label>MDR Crédito (%)</label>
<input id="mdr" type="number">

<label>2x a 6x (%)</label>
<input id="taxa1" type="number">

<label>7x a 12x (%)</label>
<input id="taxa2" type="number">

<label>13x a 21x (%)</label>
<input id="taxa3" type="number">

</div>

<div id="taxas-mp" style="display:none">

<h3>Mercado Pago</h3>

<label>Pix (%)</label>
<input id="mp_pix" type="number">

<label>Débito (%)</label>
<input id="mp_debito" type="number">

<br><br>

<label>Colar tabela Mercado Pago</label>

<textarea id="colarTabela" placeholder="Exemplo:

1x 4.99
2x 6.59
3x 7.99
...
18x 22.59"></textarea>

<button onclick="preencherTabela()">Preencher taxas automaticamente</button>

<br><br>

<div id="camposMP"></div>

</div>

<br>

<button onclick="calcular()">SIMULAR</button>

<button onclick="compartilhar()">COMPARTILHAR</button>

</div>

<div id="resultado"></div>

<script src="app.js"></script>

</body>
</html>
