<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Taxas Falcões BA21</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script src="app.js" defer></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.mp{
background:#ffe066;
}

.outras{
background:#111;
color:white;
}

.taxaRuim{
color:red;
font-weight:bold;
}

#statusOCR{
font-weight:bold;
margin:10px 0;
}

.tituloModo{
display:flex;
align-items:center;
gap:15px;
margin-top:20px;
}

.radioGroup{
display:flex;
gap:10px;
font-size:14px;
}

</style>

</head>

<body>

<h1>🦅 Calculadora de Taxas</h1>

<div class="container">

<label>Valor da venda</label> <input id="valor" type="number">

<h3>Mercado Pago</h3>

<label>Pix (%)</label> <input id="mp_pix">

<label>Débito (%)</label> <input id="mp_debito">

<label>Crédito 1x (%)</label> <input id="mp1">

<h3>Importar Parcelamento Mercado Pago</h3>

<input type="file" id="uploadOCR">

<div id="statusOCR"></div>

<div id="mpParcelas"></div>

<div class="tituloModo">

<h3>Outras adquirências</h3>

<div class="radioGroup">

<label>
<input type="radio" name="modoOutras" value="faixa" checked onclick="alternarModo()">
Faixa MDR
</label>

<label>
<input type="radio" name="modoOutras" value="manual" onclick="alternarModo()">
Manual
</label>

</div>

</div>

<div id="modoFaixa">

<label>Pix (%)</label> <input id="out_pix">

<label>Débito (%)</label> <input id="out_debito">

<label>Crédito 1x (%)</label> <input id="out1">

<label>MDR 2-6x</label> <input id="mdr1">

<label>MDR 7-12x</label> <input id="mdr2">

<label>MDR 13-21x</label> <input id="mdr3">

<label>Antecipação mensal (%)</label> <input id="antecipacao">

</div>

<div id="modoManual" style="display:none">

<div id="manualParcelas"></div>

</div>

<button onclick="simular()">SIMULAR</button>

<button onclick="exportar()">EXPORTAR RESULTADO</button>

</div>

<div id="resultado"></div>

</body>

</html>
