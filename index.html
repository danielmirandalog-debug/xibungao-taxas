<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Taxas Falcões da BA21</title>

<link rel="icon" href="icon.svg">
<link rel="manifest" href="manifest.json">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="app.js" defer></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.mp{
background:#ffe066;
}

.outras{
background:#111;
color:white;
}

.taxaRuim{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🦅 CALCULADORA DE TAXAS FALCÕES DA BA21</h1>

<div class="container">

<label>Valor da venda</label> <input id="valor" type="number">

<h3>Mercado Pago</h3>

<label>Pix %</label> <input id="mp_pix">

<label>Débito %</label> <input id="mp_debito">

<label>Crédito 1x %</label> <input id="mp1">

<h3>Importar parcelamento Mercado Pago</h3>

<input type="file" id="uploadOCR">

<button onclick="lerOCR()">Ler imagem das taxas (2x a 21x)</button>

<div id="mpParcelas"></div>

<h3>Outras adquirências</h3>

<label>Pix %</label> <input id="out_pix">

<label>Débito %</label> <input id="out_debito">

<label>Crédito 1x %</label> <input id="out1">

<label>MDR 2-6x</label> <input id="mdr1">

<label>MDR 7-12x</label> <input id="mdr2">

<label>MDR 13-21x</label> <input id="mdr3">

<label>Taxa antecipação mensal (%)</label> <input id="antecipacao">

<button onclick="simular()">SIMULAR</button>

<button onclick="exportar()">EXPORTAR PNG</button>

</div>

<div id="resultado"></div>

</body>
</html>
