<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XIBUNGÃO TAXAS</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>

<body class="adq">

<h1>💰 XIBUNGÃO TAXAS</h1>

<select id="modo">

<option value="adq">Outras adquirências</option>
<option value="mp">Mercado Pago</option>

</select>


<div id="adquirencia">

<h2>⚫ Outras adquirências</h2>

<label>Taxa PIX %</label>
<input id="pix" type="number">

<label>Taxa Débito %</label>
<input id="debito" type="number">

<label>MDR crédito %</label>
<input id="mdr" type="number">

<label>Antecipação mensal %</label>
<input id="antecipacao" type="number">

<label>Taxa crédito 2x a 6x %</label>
<input id="t26" type="number">

<label>Taxa crédito 7x a 12x %</label>
<input id="t712" type="number">

<label>Taxa crédito 13x a 21x %</label>
<input id="t1321" type="number">

</div>


<div id="mercadopago" style="display:none">

<h2>🟡 Mercado Pago</h2>

<label>Taxa PIX %</label>
<input id="mpPix" type="number">

<label>Taxa Débito %</label>
<input id="mpDebito" type="number">

<p>Informe a taxa de cada parcela</p>

<div id="mpInputs"></div>

</div>


<label>Valor da venda</label>
<input id="valor" type="number">

<button onclick="calcular()">SIMULAR</button>

<button onclick="compartilhar()">COMPARTILHAR</button>


<div id="resumo"></div>


<table id="resultado">

<tr>
<th>Tipo</th>
<th>Taxa</th>
<th>Recebe</th>
</tr>

</table>


<script src="app.js"></script>

</body>
</html>
