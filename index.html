<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparador de Taxas</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="app.js" defer></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#FFE600;
color:#2D3277;
padding:20px;
text-align:center;
border-bottom:4px solid #2D3277;
}

.logo{
font-size:28px;
font-weight:bold;
}

.sub{
font-size:15px;
}

.container{
max-width:950px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:7px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#2D3277;
color:white;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

td,th{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

</style>

</head>

<body>

<header>

<div class="logo">🦅 Falcões BA21</div>
<div class="sub">Comparador profissional de taxas</div>

</header>

<div class="container">

<div class="card">

<label>Valor da venda</label> <input id="valor" type="number">

</div>

<div class="card">

<h3>Mercado Pago</h3>

<label>Pix (%)</label> <input id="mp_pix">

<label>Débito (%)</label> <input id="mp_debito">

<label>Crédito 1x (%)</label> <input id="mp1">

<h4>Importar taxas por imagem</h4>

<input type="file" id="uploadOCR">

<div id="statusOCR"></div>

<div id="mpParcelas"></div>

</div>

<div class="card">

<h3>Outras adquirências</h3>

<label>Pix (%)</label> <input id="out_pix">

<label>Débito (%)</label> <input id="out_debito">

<label>Crédito 1x (%)</label> <input id="out1">

<label>MDR 2-6x</label> <input id="mdr1">

<label>MDR 7-12x</label> <input id="mdr2">

<label>MDR 13-21x</label> <input id="mdr3">

<label>Antecipação (%)</label> <input id="antecipacao">

</div>

<div class="card">

<button onclick="simular()">SIMULAR</button> <button onclick="exportar()">EXPORTAR RELATÓRIO</button>

</div>

<div class="card">

<div id="resultado"></div>

</div>

<div class="card" id="simulacaoFaturamento" style="display:none">

<h3>Simulação de faturamento</h3>

<label>Faturamento médio mensal</label> <input id="faturamentoMensal">

<h4>
Concentração de vendas
<span id="totalShare">Total: 100%</span>
</h4>

<label>Pix (%)</label> <input id="share_pix" value="20" oninput="verificarShares()">

<label>Débito (%)</label> <input id="share_debito" value="20" oninput="verificarShares()">

<label>Crédito 1x (%)</label> <input id="share_1x" value="20" oninput="verificarShares()">

<label>Parcelado 2-6x (%)</label> <input id="share_2_6" value="20" oninput="verificarShares()">

<label>Parcelado 7-12x (%)</label> <input id="share_7_12" value="20" oninput="verificarShares()">

<div id="erroShare" style="color:red"></div>

<h3>Custos mensais</h3>

<table>

<tr>
<th></th>
<th>Mercado Pago</th>
<th>Outros</th>
</tr>

<tr>
<td>Cesta de serviços</td>
<td><input id="mp_cesta"></td>
<td><input id="out_cesta"></td>
</tr>

<tr>
<td>Aluguel máquina</td>
<td><input id="mp_maquina"></td>
<td><input id="out_maquina"></td>
</tr>

<tr>
<td>Sistema integrado</td>
<td><input id="mp_sistema"></td>
<td><input id="out_sistema"></td>
</tr>

</table>

<button onclick="calcularFaturamento()">Calcular economia anual</button>

<canvas id="grafico"></canvas>

<div id="resultadoFaturamento"></div>

</div>

</div>

</body>

</html>
