<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>XIBUNGÃO TAXAS</title>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
}

header{
padding:20px;
color:white;
font-size:30px;
}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

input,select{
width:90%;
padding:10px;
margin:8px;
font-size:16px;
}

button{
padding:12px;
width:95%;
font-size:18px;
background:#333;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td{
border:1px solid #ccc;
padding:8px;
}

</style>

</head>

<body>

<header id="topo">💸 XIBUNGÃO TAXAS</header>

<div class="container">

<select id="modo" onchange="mudarModo()">

<option value="mp">Mercado Pago</option>
<option value="outros">Outras adquirências</option>

</select>

<div id="mercadopago">

<h3>Taxas Mercado Pago</h3>

<input id="valorMP" placeholder="Valor da venda">

<div id="taxasMP"></div>

<button onclick="calcularMP()">Calcular</button>

</div>

<div id="outros" style="display:none">

<h3>Outras adquirências</h3>

<input id="valorOUT" placeholder="Valor da venda">

<input id="taxa1" placeholder="Taxa 1x (%)">

<input id="taxa2a6" placeholder="Taxa 2x a 6x (%)">

<input id="taxa7a12" placeholder="Taxa 7x a 12x (%)">

<input id="taxa13a18" placeholder="Taxa 13x a 18x (%)">

<input id="taxa19a21" placeholder="Taxa 19x a 21x (%)">

<button onclick="calcularOUT()">Calcular</button>

</div>

<table id="tabela"></table>

<button onclick="compartilhar()">📤 Compartilhar</button>

</div>

<script>

for(let i=1;i<=18;i++){

let campo=document.createElement("input");

campo.placeholder="Taxa "+i+"x (%)";

campo.id="mp"+i;

document.getElementById("taxasMP").appendChild(campo);

}

function mudarModo(){

let modo=document.getElementById("modo").value;

if(modo=="mp"){

document.getElementById("mercadopago").style.display="block";
document.getElementById("outros").style.display="none";
document.body.style.background="#ffd100";

}else{

document.getElementById("mercadopago").style.display="none";
document.getElementById("outros").style.display="block";
document.body.style.background="#000";
document.body.style.color="white";

}

}

function calcularMP(){

let valor=parseFloat(document.getElementById("valorMP").value);

let tabela="";

for(let i=1;i<=18;i++){

let taxa=parseFloat(document.getElementById("mp"+i).value)/100;

if(!isNaN(taxa)){

let liquido=valor*(1-taxa);

tabela+="<tr><td>"+i+"x</td><td>R$ "+liquido.toFixed(2)+"</td></tr>";

}

}

document.getElementById("tabela").innerHTML=tabela;

}

function calcularOUT(){

let valor=parseFloat(document.getElementById("valorOUT").value);

let taxa1=document.getElementById("taxa1").value/100;
let taxa2a6=document.getElementById("taxa2a6").value/100;
let taxa7a12=document.getElementById("taxa7a12").value/100;
let taxa13a18=document.getElementById("taxa13a18").value/100;
let taxa19a21=document.getElementById("taxa19a21").value/100;

let tabela="";

for(let i=1;i<=21;i++){

let taxa;

if(i==1) taxa=taxa1;
else if(i<=6) taxa=taxa2a6;
else if(i<=12) taxa=taxa7a12;
else if(i<=18) taxa=taxa13a18;
else taxa=taxa19a21;

let liquido=valor*(1-taxa);

tabela+="<tr><td>"+i+"x</td><td>R$ "+liquido.toFixed(2)+"</td></tr>";

}

document.getElementById("tabela").innerHTML=tabela;

}

function compartilhar(){

let texto=document.getElementById("tabela").innerText;

navigator.share({

title:"Simulação XIBUNGÃO TAXAS",
text:texto

});

}

</script>

</body>
</html>
